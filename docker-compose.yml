services:
  postgres:
    image: postgres:16-alpine
    container_name: gamex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamex
      POSTGRES_PASSWORD: gamex123
      POSTGRES_DB: gamex_db
    ports:
      - "5432:5432"
    volumes:
      - gamex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamex -d gamex_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gamex_pgdata:
